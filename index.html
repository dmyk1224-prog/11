<meta name="theme-color" content="#2f8fd1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root, body[data-theme="sunny"]{
    --ink:#3d2f22;
    --ink-soft:#8a7565;
    --paper:#fbf3ea;
    --paper-raise:#ffffff;
    --line:#ecdcc9;
    --navy:#d9622f;
    --navy-deep:#a84a22;
    --amber:#f5b942;
    --amber-soft:#fbe3b8;
    --danger:#d1495b;
    --good:#3f6b52;
    --radius:20px;
    --shadow: 0 2px 4px rgba(120,80,40,0.08), 0 6px 18px rgba(120,80,40,0.08);
  }
  body[data-theme="classic"]{
    --ink:#20313a; --ink-soft:#5b6d74; --paper:#f5f1e9; --paper-raise:#ffffff; --line:#dcd4c3;
    --navy:#233d45; --navy-deep:#152731; --amber:#c07a2e; --amber-soft:#e9c491;
    --danger:#a4442e; --good:#3f6b52;
  }
  body[data-theme="mint"]{
    --ink:#1c3d38; --ink-soft:#6b948b; --paper:#f0faf8; --paper-raise:#ffffff; --line:#cdeee6;
    --navy:#1f9e8f; --navy-deep:#157567; --amber:#ff8fab; --amber-soft:#ffd9e2;
    --danger:#d1495b; --good:#2f7a5c;
  }
  body[data-theme="lavender"]{
    --ink:#332b52; --ink-soft:#8a80ac; --paper:#f7f4ff; --paper-raise:#ffffff; --line:#e3dbff;
    --navy:#7c6fe0; --navy-deep:#5d4fc4; --amber:#ffb84d; --amber-soft:#ffe2b3;
    --danger:#d1495b; --good:#4a8f6b;
  }
  body[data-theme="sky"]{
    --ink:#1e3a4d; --ink-soft:#6f92a6; --paper:#f0f8fd; --paper-raise:#ffffff; --line:#cfe6f5;
    --navy:#2f8fd1; --navy-deep:#1f6da8; --amber:#ffd166; --amber-soft:#ffedc2;
    --danger:#d1495b; --good:#2f8f6f;
  }
  body[data-theme="cherry"]{
    --ink:#4a2530; --ink-soft:#a67885; --paper:#fff3f6; --paper-raise:#ffffff; --line:#ffd9e2;
    --navy:#d94f70; --navy-deep:#ad3956; --amber:#ffd166; --amber-soft:#ffe9b8;
    --danger:#b8394f; --good:#3f6b52;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'M PLUS Rounded 1c', -apple-system, 'Hiragino Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    padding-bottom:90px;
    transition:background 0.25s, color 0.25s;
  }
  .bg-texture{
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image: radial-gradient(circle at 1px 1px, rgba(32,49,58,0.035) 1px, transparent 0);
    background-size: 18px 18px;
  }
  header.app-head{
    position:relative; z-index:1;
    background: linear-gradient(135deg, var(--navy-deep), var(--navy) 65%);
    color:#f2ede0;
    padding:22px 18px 26px;
    border-bottom-left-radius:22px;
    border-bottom-right-radius:22px;
    box-shadow: var(--shadow);
  }
  .head-top{display:flex; align-items:flex-start; justify-content:space-between; gap:10px;}
  .head-title{
    font-family:'M PLUS Rounded 1c', sans-serif; font-weight:800;
    font-weight:700;
    font-size:26px;
    letter-spacing:0.12em;
    margin:0;
  }
  .head-sub{
    font-size:12px;
    color:#c9b98e;
    margin-top:4px;
    letter-spacing:0.05em;
  }
  .gear-btn{
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.25);
    color:#f2ede0;
    width:38px; height:38px;
    border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:18px;
    flex-shrink:0;
  }
  .vehicle-strip{
    margin-top:16px;
    display:flex; gap:10px; flex-wrap:wrap;
  }
  .vchip{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(201,185,142,0.35);
    color:#e9e2cf;
    font-size:12.5px;
    padding:6px 12px;
    border-radius:999px;
    display:flex; align-items:center; gap:6px;
  }
  .vchip b{color:#f2ede0; font-weight:700;}

  main{
    position:relative; z-index:1;
    max-width:520px;
    margin:0 auto;
    padding:16px 14px 0;
  }

  .month-card{
    background:var(--paper-raise);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px;
    box-shadow:var(--shadow);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  #backupBanner{
    background:linear-gradient(135deg, var(--amber-soft), #f0d9ab);
    border:1px solid var(--amber);
    color:var(--navy-deep);
    font-size:13px;
    font-weight:600;
    padding:12px 16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
  }
  #backupBanner .bb-arrow{ font-size:18px; color:var(--amber); }
  .month-nav-btn{
    background:var(--paper);
    border:1px solid var(--line);
    width:34px; height:34px;
    border-radius:9px;
    font-size:16px;
    color:var(--navy);
    display:flex; align-items:center; justify-content:center;
  }
  .month-center{ text-align:center; flex:1;}
  .month-label{ font-size:13px; color:var(--ink-soft); letter-spacing:0.05em;}
  .month-total{ font-family:'M PLUS Rounded 1c', sans-serif; font-size:30px; font-weight:800; color:var(--navy); line-height:1.2;}
  .month-total span{font-size:14px; font-weight:500; color:var(--ink-soft); margin-left:4px;}
  .month-meta{ font-size:11.5px; color:var(--ink-soft); margin-top:2px;}

  .section-label{
    display:flex; align-items:center; gap:8px;
    margin:22px 2px 10px;
    color:var(--ink-soft);
    font-size:13px;
    letter-spacing:0.08em;
  }
  .section-label::after{
    content:''; flex:1; height:1px; background:var(--line);
  }

  .empty-state{
    text-align:center;
    padding:40px 20px;
    color:var(--ink-soft);
    border:1.5px dashed var(--line);
    border-radius:var(--radius);
    font-size:13.5px;
    line-height:1.9;
  }

  .trip-card{
    background:var(--paper-raise);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px 15px;
    margin-bottom:10px;
    box-shadow:var(--shadow);
  }
  .trip-top{
    display:flex; justify-content:space-between; align-items:flex-start;
    margin-bottom:8px;
  }
  .trip-date{
    font-size:13px; color:var(--ink-soft); font-weight:500;
    display:flex; align-items:center; gap:6px;
  }
  .trip-date b{color:var(--ink); font-size:14.5px;}
  .trip-no{
    background:var(--amber-soft); color:var(--navy-deep);
    font-size:10.5px; font-weight:700; padding:2px 7px; border-radius:999px;
  }
  .distance-badge{
    background:var(--navy);
    color:#f2ede0;
    font-size:13px;
    font-weight:700;
    padding:4px 10px;
    border-radius:999px;
    white-space:nowrap;
  }
  .route-line{
    display:flex; flex-wrap:wrap; align-items:center;
    gap:4px;
    font-size:14px;
    line-height:1.5;
    margin:2px 0 4px;
  }
  .route-node{ font-weight:600; }
  .route-arrow{ color:var(--amber); font-weight:700; }
  .route-addr{ font-size:11.5px; color:var(--ink-soft); }
  .trip-time{
    font-size:12px; color:var(--ink-soft); margin-top:6px;
  }
  .trip-note{
    font-size:12.5px; color:var(--ink-soft);
    margin-top:6px;
    background:var(--paper);
    padding:6px 9px;
    border-radius:8px;
  }
  .trip-actions{
    display:flex; gap:8px; margin-top:10px;
  }
  .mini-btn{
    flex:1;
    background:var(--paper);
    border:1px solid var(--line);
    color:var(--navy);
    font-size:12.5px;
    font-weight:600;
    padding:8px 0;
    border-radius:9px;
  }
  .mini-btn.danger{ color:var(--danger); }

  .fab{
    position:fixed;
    right:20px; bottom:24px;
    z-index:5;
    background: linear-gradient(135deg, var(--amber), #a5661f);
    color:#fff;
    border:none;
    width:60px; height:60px;
    border-radius:50%;
    font-size:28px;
    box-shadow: 0 6px 18px rgba(160,100,30,0.4);
    display:flex; align-items:center; justify-content:center;
  }

  /* Modal */
  .overlay{
    position:fixed; inset:0; background:rgba(21,39,49,0.55);
    z-index:20; display:flex; align-items:flex-end; justify-content:center;
    backdrop-filter: blur(2px);
  }
  .sheet{
    background:var(--paper);
    width:100%; max-width:560px;
    max-height:92vh;
    overflow-y:auto;
    border-top-left-radius:20px; border-top-right-radius:20px;
    padding:6px 18px 24px;
    animation: slideup 0.22s ease-out;
  }
  @keyframes slideup{ from{transform:translateY(30px); opacity:0.4;} to{transform:translateY(0); opacity:1;} }
  .sheet-handle{
    width:40px; height:4px; background:var(--line); border-radius:99px;
    margin:10px auto 6px;
  }
  .sheet-title{
    font-family:'M PLUS Rounded 1c', sans-serif; font-weight:800;
    font-size:19px; font-weight:700;
    margin:6px 0 14px;
    display:flex; justify-content:space-between; align-items:center;
  }
  .close-x{
    background:none; border:none; font-size:20px; color:var(--ink-soft); padding:4px 8px;
  }

  .field{ margin-bottom:14px; }
  .field label{
    display:block; font-size:12px; color:var(--ink-soft); margin-bottom:5px; font-weight:600; letter-spacing:0.03em;
  }
  .field input, .field select, .field textarea{
    width:100%;
    border:1px solid var(--line);
    background:var(--paper-raise);
    border-radius:10px;
    padding:11px 12px;
    font-size:15px;
    color:var(--ink);
    font-family:inherit;
  }
  .field textarea{ resize:vertical; min-height:52px; }
  .clear-wrap{ position:relative; }
  .clear-wrap input{ padding-right:34px; }
  .clear-x-btn{
    position:absolute; right:6px; top:50%; transform:translateY(-50%);
    width:24px; height:24px; border:none; background:none;
    color:var(--ink-soft); font-size:17px; line-height:1;
    display:flex; align-items:center; justify-content:center;
  }
  .addr-row{ display:flex; flex-direction:column; gap:8px; }
  .place-row{ display:flex; gap:8px; }
  .place-row input{ flex:1; }
  .icon-btn-row{ display:flex; gap:6px; flex-wrap:wrap; }
  .map-icon-btn{
    flex-shrink:0; width:40px; height:40px; border:1px solid var(--line);
    background:var(--paper-raise); border-radius:10px; font-size:17px;
    display:flex; align-items:center; justify-content:center;
  }
  .map-icon-btn.recording{ background:var(--danger); color:#fff; border-color:var(--danger); }
  .row2{ display:flex; gap:10px; }
  .row2 > .field{ flex:1; }

  .odo-hint{ font-size:11px; color:var(--ink-soft); margin-top:4px; }
  .calc-distance{
    background:var(--navy); color:#f2ede0; border-radius:10px; padding:10px 12px;
    font-size:14px; display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;
  }
  .calc-distance b{ font-size:19px; }

  .waypoint-block{
    border:1px solid var(--line);
    border-radius:12px;
    padding:12px 12px 4px;
    margin-bottom:10px;
    background:rgba(255,255,255,0.5);

  }
  .wp-remove{

  }
  .add-wp-btn{

    border:1.5px dashed var(--line);
    background:none;
    color:var(--navy);
    font-size:13.5px; font-weight:600;
    padding:10px; border-radius:10px; margin-bottom:16px;
  }

  .save-btn{
    width:100%;
    background: linear-gradient(135deg, var(--navy-deep), var(--navy));
    color:#f2ede0;
    border:none;
    padding:14px;
    border-radius:12px;
    font-size:15.5px;
    font-weight:700;
    letter-spacing:0.06em;
    margin-top:6px;
  }
  .del-btn-full{
    width:100%;
    background:none;
    border:1px solid var(--danger);
    color:var(--danger);
    padding:12px;
    border-radius:12px;
    font-size:13.5px;
    font-weight:600;
    margin-top:10px;
  }

  .place-quick{
    display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px;
  }
  .place-chip{
    background:var(--paper-raise);
    border:1px solid var(--line);
    color:var(--navy);
    font-size:11.5px;
    padding:5px 10px;
    border-radius:999px;
    font-weight:600;
  }

  .settings-list-item{
    display:flex; justify-content:space-between; align-items:center;
    background:var(--paper-raise); border:1px solid var(--line);

    gap:8px;
  }
  .sli-num{

    background:var(--navy); color:#f2ede0; font-size:11px; font-weight:700;
    display:flex; align-items:center; justify-content:center;
  }
  .settings-list-item .sli-txt{ flex:1; }
  .settings-list-item .sli-addr{ font-size:11px; color:var(--ink-soft); }
  .sli-order{ display:flex; flex-direction:column; gap:2px; }
  .sli-order-btn{

  .sli-del{ background:none; border:none; color:var(--danger); font-size:16px; padding:0 4px;}

  .tabbar{
    display:flex; gap:8px; margin-bottom:14px;

  .tabbtn{

  }
  .tabbtn.active{ background:var(--navy); color:#f2ede0; border-color:var(--navy); }

  .theme-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:10px;
  }
  .theme-swatch{
    border:2px solid var(--line);
    border-radius:14px;
    padding:10px;

  }
  .theme-swatch.selected{ border-color:var(--navy); box-shadow:0 0 0 2px var(--amber-soft) inset; }
  .theme-dot{
    width:26px; height:26px; border-radius:50%; flex-shrink:0;

  }
  .theme-name{ font-size:12.5px; font-weight:700; color:var(--ink); }

  .toast{
    position:fixed; bottom:100px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:10px 18px; border-radius:999px;
    font-size:13px; z-index:50; opacity:0; pointer-events:none; transition:opacity 0.25s;
  }
  .toast.show{ opacity:1; }

  /* Print sheet */
  #printSheet{ display:none; }
  @media print{
    body *{ visibility:hidden; }
    #printSheet, #printSheet *{ visibility:visible; }
    #printSheet{
      display:block !important;
      position:absolute; top:0; left:0; width:100%;
      padding:20px; font-family:'Hiragino Sans', 'Yu Gothic', sans-serif; font-weight:400; color:#111;
    }
    .print-title{ text-align:center; font-size:22px; font-weight:700; letter-spacing:0.3em; margin-bottom:20px; }
    .print-meta{ display:flex; justify-content:space-between; margin-bottom:14px; font-size:14px; }
    .print-day{ margin-bottom:10px; }
    .print-day.print-pagebreak{ page-break-before: always; padding-top:20px; }
    table.print-table{ width:100%; border-collapse:collapse; font-size:13px; }
    table.print-table thead{ display:table-header-group; }
    table.print-table tbody{ display:table-row-group; }
    table.print-table tr{ page-break-inside:avoid; break-inside:avoid; }
    table.print-table th, table.print-table td{ border:1px solid #333; padding:8px; text-align:left; }
    table.print-table th{ background:#eee; }
    .print-date-cell{ background:#ddd !important; font-size:15px; font-weight:700; border-bottom:2px solid #333; }
    .print-summary-heading{ font-size:15px; font-weight:700; margin:18px 0 8px; border-bottom:2px solid #333; padding-bottom:4px; }
    .print-foot{ margin-top:8px; font-size:13px; text-align:right; }
    .print-grand-total{ margin-top:22px; font-size:16px; font-weight:700; text-align:right; border-top:2px solid #333; padding-top:10px; }
  }

  .time-row{ display:flex; gap:6px; align-items:center; }
  .time-row input[type="time"]{ flex:1; }
  .now-btn{
    flex-shrink:0; background:var(--paper-raise); border:1px solid var(--line);
    color:var(--navy); font-size:12px; font-weight:600; padding:0 10px; height:44px;
    border-radius:10px; white-space:nowrap;
  }

  ::placeholder{ color:#a9a596; }
</style>
